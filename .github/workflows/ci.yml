name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  signing-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: fmt
        working-directory: signing-service
        run: cargo fmt --check
      - name: test
        working-directory: signing-service
        run: cargo test --locked
      - name: clippy
        working-directory: signing-service
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/enclava-labs/policy-signing-service
          tags: |
            type=ref,event=branch
            type=sha,prefix=
      - name: Build and maybe push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: signing-service/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
      - name: Sign pushed digest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/enclava-labs/policy-signing-service
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for attempt in 1 2 3; do
            if cosign sign --yes "${IMAGE}@${DIGEST}"; then
              exit 0
            fi
            sleep "$((attempt * 10))"
          done
          exit 1
